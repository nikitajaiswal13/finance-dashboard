<div class="dashboard-container">

  <!-- Summary Cards -->
  <div class="cards-row">
    <mat-card class="summary-card balance">
      <mat-card-content>
        <div class="card-icon"><mat-icon>account_balance_wallet</mat-icon></div>
        <div class="card-info">
          <span class="card-label">Total Balance</span>
          <span class="card-value">{{ totalBalance | currency:'INR':'symbol':'1.0-0' }}</span>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="summary-card income">
      <mat-card-content>
        <div class="card-icon"><mat-icon>trending_up</mat-icon></div>
        <div class="card-info">
          <span class="card-label">Total Income</span>
          <span class="card-value">{{ totalIncome | currency:'INR':'symbol':'1.0-0' }}</span>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="summary-card expenses">
      <mat-card-content>
        <div class="card-icon"><mat-icon>trending_down</mat-icon></div>
        <div class="card-info">
          <span class="card-label">Total Expenses</span>
          <span class="card-value">{{ totalExpenses | currency:'INR':'symbol':'1.0-0' }}</span>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <!-- Charts Row -->
  <div class="charts-row">
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Balance Trend</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <canvas baseChart
          [data]="lineChartData"
          [options]="lineChartOptions"
          type="line">
        </canvas>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Spending by Category</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <canvas baseChart
          [data]="doughnutChartData"
          [options]="doughnutChartOptions"
          type="doughnut">
        </canvas>
      </mat-card-content>
    </mat-card>
  </div>

</div>
